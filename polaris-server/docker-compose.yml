version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: polaris-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: polaris
      MYSQL_USER: polaris
      MYSQL_PASSWORD: polaris123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: polaris-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: polaris-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: polaris-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: polaris
      RABBITMQ_DEFAULT_PASS: polaris123
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  mysql_data:
  minio_data:
