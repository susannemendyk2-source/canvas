# Polaris Studio Nginx Configuration
# Deploy to /etc/nginx/sites-available/polaris
# Then: ln -s /etc/nginx/sites-available/polaris /etc/nginx/sites-enabled/
#
# 无域名时直接用 IP 访问 HTTP (80)，后期加域名后配 SSL:
#   certbot --nginx -d your-domain.com
#   然后取消下面 SSL server 块的注释，再将 HTTP 块改为重定向

# ========== HTTP (默认入口) ==========
server {
    listen 80;
    server_name 47.107.147.186;

    # --- 如果有域名后，开启 HTTPS 重定向 ---
    # return 301 https://$host$request_uri;

    # --- 安全头 ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    server_tokens off;
    client_max_body_size 40M;

    # --- 限速 (防暴力) ---
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=ai:10m rate=2r/s;

    # ===== 前端 (Nuxt SSR) =====
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ===== 后端 API =====
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 300s;
    }

    # ===== 认证接口 (更严格限速) =====
    location /api/auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:8080/api/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ===== AI 生成接口 (长时间 + 严格限速) =====
    location /api/ai/ {
        limit_req zone=ai burst=2 nodelay;
        proxy_pass http://127.0.0.1:8080/api/ai/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_connect_timeout 60s;
        proxy_send_timeout 180s;
        proxy_read_timeout 600s;
    }

    # ===== 用户上传文件 =====
    location /uploads/ {
        proxy_pass http://127.0.0.1:8080/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ===== 封禁内部端点 =====
    location /actuator/ {
        deny all;
        return 404;
    }

    location /h2-console/ {
        deny all;
        return 404;
    }

    # ===== Swagger 仅内网 =====
    location /swagger-ui.html {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        deny all;
        proxy_pass http://127.0.0.1:8080;
    }

    location /api-docs {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        deny all;
        proxy_pass http://127.0.0.1:8080;
    }
}

