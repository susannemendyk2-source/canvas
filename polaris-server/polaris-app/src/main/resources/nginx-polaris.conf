# Polaris Studio Nginx configuration
# Target server: 47.107.147.186
# Install path:
#   /opt/polaris/frontend  -> Nuxt static files from polaris-web/.output/public
#   /opt/polaris/backend   -> polaris-app-1.0.0.jar

limit_req_zone $binary_remote_addr zone=polaris_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=polaris_auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=polaris_ai:10m rate=2r/s;

server {
    listen 80;
    server_name 47.107.147.186;

    server_tokens off;
    client_max_body_size 40M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    root /opt/polaris/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /_nuxt/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /api/auth/ {
        limit_req zone=polaris_auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:8080/api/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ai/ {
        limit_req zone=polaris_ai burst=2 nodelay;
        proxy_pass http://127.0.0.1:8080/api/ai/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 180s;
        proxy_read_timeout 600s;
    }

    location /api/ {
        limit_req zone=polaris_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 300s;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:8080/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /minio/ {
        proxy_pass http://127.0.0.1:9000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /actuator/ { deny all; return 404; }
    location /h2-console/ { deny all; return 404; }

    location /swagger-ui.html {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        deny all;
        proxy_pass http://127.0.0.1:8080;
    }

    location /api-docs {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        deny all;
        proxy_pass http://127.0.0.1:8080;
    }
}
