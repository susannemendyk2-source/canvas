server:
  port: 8080

spring:
  application:
    name: polaris-server
  datasource:
    url: jdbc:mysql://localhost:3306/polaris?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: polaris
    password: polaris123
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
    rabbitmq:
      host: localhost
      port: 5672
      username: polaris
      password: polaris123
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.polaris.**.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin123
  bucket: polaris-assets

polaris:
  jwt:
    secret: YTkzN2JjZjE0YzU4ZTY3YjI5MDFjZDJjM2Y4YzE1YjY=
    expiration: 86400000
  oss:
    type: minio

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.springframework: INFO
    com.polaris: DEBUG
  file:
    name: ./polaris-server.log
  logback:
    rollingpolicy:
      max-history: 3
      max-file-size: 10MB
